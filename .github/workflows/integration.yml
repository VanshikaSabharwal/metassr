name: Integration Test

on:
  push:
    branches: ["master", "mac-os-tests", "test"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      METACALL_INSTALL_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/lib' || matrix.os == 'ubuntu-latest' && '/usr/local/lib' || '' }}
      RUSTFLAGS: ${{ matrix.os == 'macos-latest' && '-L /opt/homebrew/lib -C link-arg=-Wl,-rpath,/opt/homebrew/lib' || matrix.os == 'ubuntu-latest' && '-L /usr/local/lib -C link-arg=-Wl,-rpath,/usr/local/lib' || '' }}
      DYLD_LIBRARY_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/lib' || '' }}
      LD_LIBRARY_PATH: ${{ matrix.os == 'ubuntu-latest' && '/usr/local/lib' || '' }}
      LIBRARY_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/lib' || matrix.os == 'ubuntu-latest' && '/usr/local/lib' || '' }}
      PKG_CONFIG_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/lib/pkgconfig' || matrix.os == 'ubuntu-latest' && '/usr/local/lib/pkgconfig' || '' }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------- MetaCall Installation ----------------

      - name: Install MetaCall Ubuntu (Debug)
        if: matrix.os == 'ubuntu-latest'
        run: curl -sL https://raw.githubusercontent.com/metacall/install/master/install.sh | sh -s -- --debug

      - name: Install MetaCall macOS
        if: matrix.os == 'macos-latest'
        run: curl -sL https://raw.githubusercontent.com/metacall/install/master/install.sh | sh

      - name: Link MetaCall library (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "Checking for MetaCall library..."

          if [ -f /opt/homebrew/lib/libmetacall.dylib ]; then
            echo "MetaCall already linked."
          else
            METACALL_DYLIB=$(find /opt/homebrew -name "libmetacall*.dylib" | head -1)

            if [ -z "$METACALL_DYLIB" ]; then
              echo "MetaCall library not found!"
              find /opt/homebrew -name "libmetacall*.dylib"
              exit 1
            fi

            echo "Linking $METACALL_DYLIB"
            sudo ln -sf "$METACALL_DYLIB" /opt/homebrew/lib/libmetacall.dylib
          fi

          ls -la /opt/homebrew/lib | grep metacall || true

      - name: Install MetaCall Windows
        if: matrix.os == 'windows-latest'
        run: powershell -NoProfile -ExecutionPolicy Unrestricted -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; &([scriptblock]::Create((Invoke-WebRequest -UseBasicParsing 'https://raw.githubusercontent.com/metacall/install/master/install.ps1')))"

      # ---------------- Debug Libraries ----------------

      - name: Debug MetaCall installation
        if: matrix.os != 'windows-latest'
        run: |
          echo "Searching for MetaCall libraries..."
          find /usr -name "libmetacall*" 2>/dev/null || true
          find /opt -name "libmetacall*" 2>/dev/null || true
          find $HOME -name "libmetacall*" 2>/dev/null || true

          echo "Environment variables:"
          echo "DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "LIBRARY_PATH=$LIBRARY_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          echo "RUSTFLAGS=$RUSTFLAGS"
          echo "METACALL_INSTALL_PATH=$METACALL_INSTALL_PATH"

      # ---------------- Rust Setup ----------------

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # ---------------- Build ----------------

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: cargo build --verbose

      - name: Build on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --verbose

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: cargo build --verbose

      # ---------------- npm permission fix ----------------

      - name: Fix npm cache permissions (macOS)
        if: matrix.os == 'macos-latest'
        run: sudo chown -R $(id -u):$(id -g) ~/.npm

      # ---------------- Integration Test ----------------

      - name: Integration Testing
        working-directory: ./tests/web-app
        shell: bash
        env:
          npm_config_script_shell: bash
        run: |
          set -e
          set -x

          node -v
          npm -v

          echo "Installing dependencies..."
          npm install

          echo "Building project..."
          npm run build:debug

          echo "Starting server..."
          npm run start:debug > server.log 2>&1 &

          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          trap "kill $SERVER_PID || true" EXIT

          echo "Waiting for server to start..."

          for i in {1..30}; do
            response=$(curl --write-out "%{http_code}" --silent --output /dev/null http://localhost:8080 || true)

            if [ "$response" = "200" ]; then
              echo "Server is ready!"
              break
            fi

            echo "Attempt $i: server not ready..."
            sleep 2
          done

          if [ "$response" != "200" ]; then
            echo "Server failed to start"
            echo "===== SERVER LOGS ====="
            cat server.log || true
            echo "======================="
            exit 1
          fi

          echo "Testing server response..."
          curl http://localhost:8080

          echo "Integration test passed!"
      # TODO: Improve testing by checking if resulting HTML is correct

      # - name: Install Playwright
      #   run: npm install -g playwright

      # - name: Run Playwright test
      #   run: |
      #     node -e "
      #       const { chromium } = require('playwright');
      #       (async () => {
      #         const browser = await chromium.launch();
      #         const page = await browser.newPage();
      #         await page.goto('http://localhost:3000');
      #         const html = await page.content();
      #         if (!html.includes('<title>My Node App</title>')) {
      #           console.error('HTML content did not match expected value');
      #           process.exit(1);
      #         }
      #         await browser.close();
      #       })();
      #     "