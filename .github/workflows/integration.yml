name: Integration Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install MetaCall Unix (Debug)
        if: matrix.os == 'ubuntu-latest' ||  matrix.os == 'macos-latest'
        run: curl -sL https://raw.githubusercontent.com/metacall/install/master/install.sh | sh -s -- --debug

      - name: Install MetaCall Windows
        if: matrix.os == 'windows-latest'
        run: powershell -NoProfile -ExecutionPolicy Unrestricted -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; &([scriptblock]::Create((Invoke-WebRequest -UseBasicParsing 'https://raw.githubusercontent.com/metacall/install/master/install.ps1')))"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build
        run: cargo build

      - name: Integration Testing
        working-directory: ./tests/web-app
        shell: bash
        env:
          npm_config_script_shell: bash
        run: |
          npm install
          npm run build:debug
          npm run start:debug &
          sleep 10
          response=$(curl --write-out "%{http_code}" --silent --output /dev/null http://localhost:8080)
          if [ "$response" -ne 200 ]; then
            echo "Server did not respond with status 200"
            exit 1
          fi
          exit 0

      # TODO: Improve testing by checking if resulting HTML is correct

      - name: Install Playwright
        run: | 
          npm install -g playwright
          npx playwright install chromium

      - name: Run Playwright test
        run: |
          node -e "
            const { chromium } = require('playwright');
            (async () => {
              console.log('Launching browser...');

              const browser = await chromium.launch();
              const page = await browser.newPage();

              console.log("Opening http://localhost:8080 ...");
              await page.goto('http://localhost:8080');

              const html = await page.content();
              console.log('Page loaded. Checking HTML Content...');

              if (!html.includes('<title>My Node App</title>')) {
                console.error('Missing or incorrect <title>My Node App</title>');
                process.exit(1);
              }
              if(!html.includes('<div id=\"root\"></div>')){
                console.error('Missing <div id=\"root\"></div>');
                process.exit(1);
              }
              if(!html.includes('<script src=\"main.js\">')){
                console.error('Missing <script src=\"main.js\">');
                process.exit(1);
              }
              if(!html.includes('<script src=\"react.js\">')){
                console.error('Missing <script src=\"react.js\">');
                process.exit(1);
              }
              if(!html.includes('<link rel=\"stylesheet\" href=\"style.css\">')){
                console.error('Missing stylesheet link style.css');
                process.exit(1);
              }     
              if(!html.includes('lang=\"en\"')){
                console.error('HTML lang attribute not set to en');
                process.exit(1);
              }     

              console.log('All HTML checks passed!');         
              
              await browser.close();
            })();
          "
