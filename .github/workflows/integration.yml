name: Integration Test
on:
  push:
    branches: ["master", "mac-os-tests", "test"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    # Set environment variables for all steps - platform-specific paths
    env:
      METACALL_INSTALL_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/lib' || matrix.os == 'ubuntu-latest' && '/usr/local/lib' || '' }}
      RUSTFLAGS: ${{ matrix.os == 'macos-latest' && '-L /opt/homebrew/lib -C link-arg=-Wl,-rpath,/opt/homebrew/lib' || matrix.os == 'ubuntu-latest' && '-L /usr/local/lib -C link-arg=-Wl,-rpath,/usr/local/lib' || '' }}
      DYLD_LIBRARY_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/lib' || '' }}
      LD_LIBRARY_PATH: ${{ matrix.os == 'ubuntu-latest' && '/usr/local/lib' || '' }}
      LIBRARY_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/lib' || matrix.os == 'ubuntu-latest' && '/usr/local/lib' || '' }}
      PKG_CONFIG_PATH: ${{ matrix.os == 'macos-latest' && '/opt/homebrew/lib/pkgconfig' || matrix.os == 'ubuntu-latest' && '/usr/local/lib/pkgconfig' || '' }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install MetaCall Ubuntu (Debug)
        if: matrix.os == 'ubuntu-latest'
        run: curl -sL https://raw.githubusercontent.com/metacall/install/master/install.sh | sh -s -- --debug

      - name: Install MetaCall macOS
        if: matrix.os == 'macos-latest'
        run: curl -sL https://raw.githubusercontent.com/metacall/install/master/install.sh | sh 

      - name: Install MetaCall Windows
        if: matrix.os == 'windows-latest'
        run: powershell -NoProfile -ExecutionPolicy Unrestricted -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; &([scriptblock]::Create((Invoke-WebRequest -UseBasicParsing 'https://raw.githubusercontent.com/metacall/install/master/install.ps1')))"

      - name: Debug MetaCall installation
        if: matrix.os != 'windows-latest'
        run: |
          echo "Searching for metacall libraries.."
          find /usr -name "libmetacall*" 2>/dev/null || true
          find /opt -name "libmetacall*" 2>/dev/null || true
          find $HOME -name "libmetacall*" 2>/dev/null || true
          echo "Listing library paths:"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "Ubuntu library path: /usr/local/lib"
            ls -la /usr/local/lib 2>/dev/null | grep metacall || echo "No metacall in /usr/local/lib"
            echo "pkg-config path: /usr/local/lib/pkgconfig"
            ls -la /usr/local/lib/pkgconfig 2>/dev/null | grep metacall || echo "No metacall.pc found"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "macOS library path: /opt/homebrew/lib"
            ls -la /opt/homebrew/lib 2>/dev/null | grep metacall || echo "No metacall in /opt/homebrew/lib"
          fi
          echo "Environment variables:"
          echo "DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "LIBRARY_PATH=$LIBRARY_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          echo "RUSTFLAGS=$RUSTFLAGS"
          echo "METACALL_INSTALL_PATH=$METACALL_INSTALL_PATH"
          echo "PATH=$PATH"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          echo "Building on macOS..."
          echo "METACALL_INSTALL_PATH=$METACALL_INSTALL_PATH"
          cargo build --verbose

      - name: Build on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Building on Ubuntu..."
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "LIBRARY_PATH=$LIBRARY_PATH"
          cargo build --verbose

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: cargo build --verbose

      - name: Fix npm cache permissions (macOS only)
        if: matrix.os == 'macos-latest'
        run: sudo chown -R $(id -u):$(id -g) ~/.npm

      - name: Integration Testing
        working-directory: ./tests/web-app
        shell: bash
        env:
          npm_config_script_shell: bash
        run: |
          npm install
          npm run build:debug
          npm run start:debug &
          sleep 10
          response=$(curl --write-out "%{http_code}" --silent --output /dev/null http://localhost:8080)
          if [ "$response" -ne 200 ]; then
            echo "Server did not respond with status 200"
            exit 1
          fi
          exit 0
